<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalBiz Connect</title>
    <link rel="stylesheet" href="servicestyles.css">
</head>
<body>

<header class="topbar">
        <div class="logo">
            Contact us
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="services.html">Services</a>
            <a href="Contactus.html">Contact us</a>
            <a href="aboutus.html">About us</a>
            <a href="student.html">Student Profile</a>
        </nav>
    </header>

<section class="page-title">
    <h1>Contact Us</h1>
    <p>Send a service enquiry.Later this form will connect to backend and databaase</p>
</section>

<section class="form-box">

    <form onsubmit="submitEnquiry(event)">

        <label for="Name">Name</label>
        <input id="Name" type="text" placeholder="Enter your name">

        <label for="Email">Email</label>
        <input id="Email" type="email" placeholder="Enter your email">

        <label for="service">Services</label>
        <select id="service">
            <option value="">select a service</option>
            <option>Website Design</option>
            <option>App Development</option>
            <option>Digital Marketing</option>
            <option>IT Support</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" placeholder="enter your message"></textarea>

        <button type="submit" class="primary-btn">Submit enquiry</button>
        <p id="formMessage"></p>
    </form>

</section>

<footer>
    <p>Form Practice Page - LocalBiz Connect</p>
</footer>
<script src="script.js"></script>
</body>
</html>
